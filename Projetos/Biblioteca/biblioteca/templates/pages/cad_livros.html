{% extends 'base.html' %}

{% block content %}
 
<div class="container mt-5">
 
    <div class="row justify-content-center">
 
        <div class="col-md-6">
 
            <div class="card shadow">
 
                <div class="card-body">
 
                    <h3>Cadastrar Livro</h3>
 
                    <form method="POST">
 
                        {% csrf_token %}
 
                        <div class="mb-3">
<label>Título</label>
<input type="text" class="form-control" name="titulo" placeholder="Digite o título">
</div>
 
                        <div class="mb-3">
<label>Autor</label>
<input type="text" class="form-control" name="autor" placeholder="Digite o autor">
</div>
 
                        <div class="mb-3">
<label>Categoria</label>
<input type="text" class="form-control" name="categoria" placeholder="Digite a categoria">
</div>
 
                        <div class="mb-3">
<label>Quantidade</label>
<input type="number" class="form-control" name="quantidade" placeholder="Digite a quantidade">
</div>
 
                        <button type="submit" class="btn btn-primary">
                            Salvar
</button>
 
                        <a href="/" class="btn btn-secondary">
                            Voltar
</a>
 
                    </form>
 
                </div>
 
            </div>
 
        </div>
 
    </div>
 
</div>
 
{% endblock %}
