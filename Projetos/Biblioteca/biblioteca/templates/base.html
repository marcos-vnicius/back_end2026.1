<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Biblioteca Python{% endblock %}</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">

        <div class="container">

            <a class="navbar-brand" href="/">
                <strong>SISTEMA BIBLIOTECA</strong>
            </a>

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'inicio' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'cadastro' %}">Cadastrar-se</a>
                </li >
                    
                <li class="nav-item">
                    <a href="{% url 'cadastrar_livros' %}">Cadastrar livros</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'listar_livros' %}">Livros</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'listar_emprestimos' %}">Empréstimos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'listar_usuarios' %}">Usuários</a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-secondary btn-sm ms-3">
                        Login
                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <main>
        {% block content %} {% endblock %}
    </main>

    <footer>

    </footer>
</body>

</html>
